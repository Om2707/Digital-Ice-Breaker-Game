services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - SERVER_PORT=3001
      - ADMIN_PASSWORD=innovate2024
    volumes:
      - ./server/data:/app/server/data
    networks:
      - board-game-network

  client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - board-game-network

networks:
  board-game-network:
    driver: bridge

volumes:
  board-game-data:
